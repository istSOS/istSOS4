[pytest]
# Self-contained config for the istSOS4 EXTENSION test suites (proprietary,
# NON-18-088). Kept entirely separate from tests/conformance/ so the conformance
# seed (no network_id) and these flag-gated extension seeds never collide.
testpaths = .
norecursedirs = .venv __pycache__ .pytest_cache
addopts = --tb=short -ra --import-mode=importlib
markers =
    network: istSOS4 NETWORK extension (proprietary, requires the service running with NETWORK=1; NOT OGC 18-088 conformance).
