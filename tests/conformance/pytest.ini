[pytest]
# Self-contained config for the OGC SensorThings API v1.1 conformance suite.
# When you invoke `pytest tests/conformance`, pytest selects THIS ini (closest
# ancestor of the test files) rather than the repo-root pytest.ini, so the
# HTTP-only conformance tests do not pull in the app's asyncio/path bootstrap.
testpaths = .
norecursedirs = .venv __pycache__ .pytest_cache
# importlib import-mode: test files live in c01/ c02/ c03/ data_array/ subfolders;
# importlib gives each its own module identity so same-named helpers across folders
# never collide, and no __init__.py packaging is required.
addopts = --tb=short -ra --import-mode=importlib
markers =
    c01: Sensing Core conformance class (read paths, navigation, control info, $value, $ref, errors).
    c02: Create-Update-Delete conformance class (POST/PATCH/PUT/DELETE, deep insert, cascade).
    c03: Filtering Extension conformance class ($orderby/$top/$skip/$count/$select/$expand/$filter).
    data_array: Data Array extension conformance class (GET ?$resultFormat=dataArray, POST dataArray).
