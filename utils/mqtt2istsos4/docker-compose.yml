services:
  mqtt2istsos:
    container_name: mqtt2istsos
    image: mqtt2istsos:0.1
    restart: unless-stopped
    init: true
    # Enable only if the container must reach services on the host via localhost.
    network_mode: host
    environment:
      MQTT2ISTSOS_CONFIG: /app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
